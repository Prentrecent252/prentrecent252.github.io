name: Pages Deploy
on:
  push:
    branches: ["main"]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: release
  cancel-in-progress: false
jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - name: Build with Jekyll
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./
          destination: ./_site
      - name: Apply
        env:
          A3CF57: ${{ secrets.A3CF57 }}
          BAFAB5: ${{ secrets.BAFAB5 }}
        run: |
          sudo chown -R "$(id -u):$(id -g)" ./_site
          python3 -c "
          import os, pathlib, sys
          gm = os.environ.get('A3CF57', '')
          bm = os.environ.get('BAFAB5', '')
          count = 0
          for p in pathlib.Path('_site').rglob('*.html'):
              try:
                  s = p.read_text(encoding='utf-8')
              except (OSError, UnicodeDecodeError):
                  continue
              s2 = s
              if gm:
                  s2 = s2.replace('<!-- 8e8140f6c232df5290d94e1fa36bd58ae704f10355e3 -->', gm)
              if bm:
                  s2 = s2.replace('<!-- 6fbc542647831b91e0a76918a1 -->', bm)
              if s2 != s:
                  p.write_text(s2, encoding='utf-8')
                  count += 1
          if count == 0 and (gm or bm):
              sys.exit(1)
          "
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: deploy
        uses: actions/deploy-pages@v4
